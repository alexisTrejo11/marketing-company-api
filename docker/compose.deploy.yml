# Deploy: Spring Boot app only — connects to external cloud services via .env
# (AWS RDS, Upstash Redis, Kafka, etc.). No local Postgres or Redis containers.
#
# Usage (from project root):
#   cp .env.example .env   # set DB_*, REDIS_URL (Upstash), JWT_*, etc.
#   docker compose -f docker/compose.deploy.yml --env-file .env up --build -d
#
# API: http://localhost:${APP_HOST_PORT:-8080}/api/graphql

name: marketing-company-deploy

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mc-app
    env_file:
      - ../.env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      JWT_ACCESS_EXPIRATION_MINUTES: ${JWT_ACCESS_EXPIRATION_MINUTES:-15}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-30}
      AUTH_MAX_SESSIONS_PER_USER: ${AUTH_MAX_SESSIONS_PER_USER:-5}
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-marketing-company-api:}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "${APP_HOST_PORT:-8080}:${SERVER_PORT:-8080}"
    volumes:
      - app_logs:/app/logs
    restart: unless-stopped

volumes:
  app_logs:
