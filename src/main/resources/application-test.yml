spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  graphql:
    graphiql:
      enabled: false

  logging:
    level:
      at.backend.MarketingCompany: WARN

app:
  auth:
    jwt:
      access-secret: test-access-secret-key-for-unit-tests-only-min-32-chars
      refresh-secret: test-refresh-secret-key-for-unit-tests-only-min-32-chars
      access-expiration-minutes: 15
      refresh-expiration-days: 30
    max-sessions-per-user: 5

  rate-limit:
    global:
      enabled: false
